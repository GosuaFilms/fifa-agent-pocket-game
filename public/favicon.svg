<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#e8c96e"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Gold border accent -->
  <rect x="2" y="2" width="60" height="60" rx="12" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>
  <!-- FA letters -->
  <text x="32" y="42" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="26" fill="url(#gold)" text-anchor="middle" letter-spacing="-1">FA</text>
  <!-- Bottom gold line accent -->
  <rect x="18" y="48" width="28" height="2.5" rx="1.25" fill="url(#gold)" opacity="0.7"/>
</svg>
